<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portofolio - Deaga Kurnia Ayu Kusuma</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black: #0A0A0A;
      --dark: #1A1A1A;
      --mid: #555555;
      --light: #AAAAAA;
      --lighter: #DDDDDD;
      --white: #F8F8F8;
      --pure: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      font-family: 'Inter', sans-serif;
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      position: relative;
    }

    .badge {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 6px 18px;
      border-radius: 20px;
    }

    .photo-wrapper {
      width: 150px; height: 150px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      overflow: hidden;
      margin-bottom: 32px;
      box-shadow: 0 0 60px rgba(255,255,255,0.06);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.3s;
      filter: grayscale(100%);
    }
    .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 7vw, 60px);
      font-weight: 300;
      color: var(--pure);
      text-align: center;
      line-height: 1.1;
      letter-spacing: -1px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .divider {
      width: 40px; height: 1px;
      background: rgba(255,255,255,0.3);
      margin: 24px auto;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    .info {
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }
    .info p {
      font-size: 13px;
      color: var(--light);
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    .info p.highlight {
      color: var(--white);
      font-weight: 500;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 40px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .btn-primary {
      display: inline-block;
      padding: 13px 44px;
      background: var(--pure);
      color: var(--black);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: var(--lighter);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,255,255,0.15);
    }

    .btn-secondary {
      display: inline-block;
      padding: 12px 44px;
      background: transparent;
      color: var(--light);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }
    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.5);
      color: var(--white);
      transform: translateY(-2px);
    }

    .deco-bottom {
      position: absolute;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      white-space: nowrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">Portofolio Mahasiswa</span>

    <div class="photo-wrapper">
      <img src="https://drive.google.com/thumbnail?id=1U-hO8ybBHeuF-YD5vlIhLYsGy3HUQHKQ&sz=w400" alt="Foto Deaga"/>
    </div>

    <h1 class="name">Deaga Kurnia<br/>Ayu Kusuma</h1>
    <div class="divider"></div>

    <div class="info">
      <p>Teknik Pengolahan Limbah</p>
      <p class="highlight">Sidoarjo, Jawa Timur</p>
    </div>

    <div class="btn-group">
      <a href="profil.html" class="btn-primary">Lihat Profil</a>
      <a href="arsip.html" class="btn-secondary">Arsip Tugas TIK</a>
    </div>

    <div class="deco-bottom">— 2025 —</div>
  </div>
</body>
</html>
